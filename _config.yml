# Site settings
title: Haeran's blog
email: maeran.dev.u@gmail.com
author: Haeran

# Copyright setting
copyright: "Unpublished Work (cleft) 2017-{currentYear} {author}"

description: >- 
  "개발, 기술, 그리고 생각을 기록하는 블로그. 목표는 다른 관점으로 개발 바라보기 👀"

baseurl: "" # the subpath of your site, e.g. /blog
url: "https://kimmand0o0.github.io"
favicon: "/assets/images/favicon.ico"

# Yat date format
yat:
  date_format: "%b %d, %Y"

# Google analytics - GA4
google_analytics: G-ZNXE6HSKMS
enableDNT: "false"

# Sitemap setting
sitemap: true

# Language setting
lang: "ko"  # default lang is en

# Theme color
theme_color: "#ffffff"  # Default color (snowwhite)
brand_color: "#ff5100"  # orangered brand color

# 미니멀/에디토리얼 리디자인 — 이 값은 이제 "바깥 wrapper" 폭이다.
# 실제 읽기 컬럼 폭은 main.scss에서 .main에 별도로 720px를 고정해서
# 사이드바(TOC) 유무와 무관하게 본문이 항상 넉넉하게 나오도록 함.
content_width: "1040px"

# Night/Dark mode
night_mode: "auto"  # Set to "auto" for auto night shift (19:00 - 07:00)

# Excerpt settings
excerpt:
  default_image: /assets/images/default-image.jpeg  # Default image when the image style is not none
  image_style: z          # Image layout style
  image_width: 38.2%      # Image default width
  image_height: 160px     # Image default height
  text_size: 350          # Words default size

# Pagination setting
paginate: 5

# Utterances comments (if needed)
utterances:
  repo: "kimmand0o0/kimmand0o0.github.io"   # Your GitHub repo
  issue_term: "title"                       # Use post title for comments
  label: "utterances comment"               # Add label to comments
  theme: "github-light"                     # Use light theme
  follow_site_theme: true                   # Follow site theme (auto change based on site theme)

# 글 작성 시각이 빌드 시점(UTC) 기준 "미래"로 찍히면 Jekyll이 기본값(false)으로
# 조용히 사이트에서 빼버린다 — 에러 없이 그냥 안 보이게 됨. KST로 글을 쓰면
# 종종 UTC 빌드 시점보다 앞서게 되므로 켜둔다.
future: true

# Build settings
markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-spaceship

# chat/ 는 별도 Cloudflare Worker 프로젝트(RAG 챗봇 백엔드) — Jekyll 빌드 대상 아님
exclude:
  - chat
