<script>
// Init highlight js
document.addEventListener('DOMContentLoaded', function(event) {
  // mermaid 블록은 highlight.js 대상에서 제외 — hljs가 addLangData에서 class를
  // "language-mermaid" -> "hljs mermaid"로 덮어써버려서, mermaid.html의 렌더링 스크립트가
  // 뒤늦게(load 시점) 찾으려는 .language-mermaid 셀렉터가 항상 빈 결과를 내는 원인이었음.
  var els = document.querySelectorAll('pre code:not(.language-mermaid)')

  function addLangData(block) {
    var outer = block.parentElement.parentElement.parentElement;
    var lang = block.getAttribute('data-lang');
    for (var i = 0; i < outer.classList.length; i++) {
      var cls = outer.classList[i];
      if (cls.startsWith('language-')) {
        lang = cls;
        break;
      }
    }
    if (!lang) {
      cls = block.getAttribute('class');
      lang = cls ? cls.replace('hljs ', '') : '';
    }
    if (lang.startsWith('language-')) {
      lang = lang.substr(9);
    }
    block.setAttribute('class', 'hljs ' + lang);
    block.parentNode.setAttribute('data-lang', lang);
  }

  function addBadge(block) {
    var enabled = ('true' || 'true').toLowerCase();
    if (enabled == 'true') {
      var pre = block.parentElement;
      pre.classList.add('badge');
    }
  }

  function handle(block) {
    addLangData(block);
    addBadge(block)
    hljs.highlightBlock(block);
  }

  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    handle(el);
  }
});
</script>

<script>
  function initPhotoSwipe() {
    let customOptions = {};

    try {
      const data = ``.replaceAll("=>", ":");
      customOptions = JSON.parse(data);
    } catch (e) {
      console.info("Invalid custom photo previewer options! " + e.message);
    }

    // Define object and gallery options
    const options = Object.assign(
      {
        gallery: "section.main",
        children: "a.photo-swipe",
        photo_scale: 2,
        // dynamic import is not supported in UMD version
        pswpModule: PhotoSwipe,
      },
      customOptions
    );

    const galleryEl = document.querySelector(options.gallery);
    if (!galleryEl) {
      return;
    }

    const imgEls = [];
    const els = galleryEl.querySelectorAll("img:not(.emoji)");
    els.forEach((el) => {
      if (el.src.trim() == "") {
        return;
      }
      if (!imgEls.includes(el)) {
        imgEls.push(el);
      }
    });

    if (imgEls.length === 0) {
      return;
    }

    imgEls.forEach((imgEl) => {
      imgEl.outerHTML = `
      <a class="photo-swipe"
        href="${imgEl.src}"
        data-pswp-width="${
          Math.max(imgEl.naturalWidth, imgEl.width) * options.photo_scale
        }"
        data-pswp-height="${
          Math.max(imgEl.naturalHeight, imgEl.height) * options.photo_scale
        }"
        data-pswp-caption="${imgEl.getAttribute("caption") || imgEl.alt}"
        target="_blank">
        ${imgEl.outerHTML}
      </a>`;
    });

    // Initialize PhotoSwipe 5
    var lightbox = new PhotoSwipeLightbox(options);

    lightbox.init();
  }

  window.addEventListener("load", initPhotoSwipe);
</script>
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

  function isDarkTheme() {
    return document.documentElement.getAttribute('data-theme') === 'dark';
  }

  mermaid.initialize({
    startOnLoad: false,
    theme: isDarkTheme() ? 'dark' : 'default',
  });

  function renderMermaidBlocks() {
    // kramdown/rouge render ```mermaid fences as <pre><code class="language-mermaid">...</code></pre>
    // mermaid.js only auto-scans <div class="mermaid">, so swap the markup before running it.
    const blocks = document.querySelectorAll('pre > code.language-mermaid');
    if (blocks.length === 0) {
      return;
    }
    blocks.forEach((code) => {
      const graphDefinition = code.textContent;
      const container = document.createElement('div');
      container.className = 'mermaid';
      container.textContent = graphDefinition;
      code.parentElement.replaceWith(container);
    });
    mermaid.run({ querySelector: '.mermaid' });
  }

  window.addEventListener('load', renderMermaidBlocks);
</script>

    var iframe = document.getElementsByClassName('goog-te-banner-frame')[0];
    if (!iframe) return;

    var innerDoc = iframe.contentDocument || iframe.contentWindow.document;
    var restore_el = innerDoc.getElementsByTagName("button");

    for (var i = 0; i < restore_el.length; i++) {
      if (restore_el[i].id.indexOf("restore") >= 0) {
        restore_el[i].click();
        var close_el = innerDoc.getElementsByClassName("goog-close-link");
        close_el[0].click();
        return;
      }
    }
  }

  function triggerHtmlEvent(element, eventName) {
    var event;
    if (document.createEvent) {
      event = document.createEvent('HTMLEvents');
      event.initEvent(eventName, true, true);
      element.dispatchEvent(event);
    } else {
      event = document.createEventObject();
      event.eventType = eventName;
      element.fireEvent('on' + event.eventType, event);
    }
  }

  var googleCombo = document.querySelector("select.goog-te-combo");
  var langSelect = document.querySelector('.ct-language');
  langSelect.addEventListener('click', function(event) {
    if (!event.target) {
      return;
    }

    var selected = document.querySelector('.ct-language .ct-language-selected');
    if (selected) {
      selected.classList.remove('ct-language-selected');
    }

    var target = event.target;
    while (target && target !== langSelect ) {
      if (target.matches('.lang-select')) {
        break;
      }
      target = target.parentElement;
    }

    if (target && target.matches('.lang-select')) {
      var lang = target.getAttribute('data-lang');
      if (googleCombo.value == lang) {
        restoreLang();
      } else {
        target.parentElement.classList.add('ct-language-selected');
        googleCombo.value = lang;
        triggerHtmlEvent(googleCombo, 'change');
      }
    }

<script>
  function initHeader() {
    var lastScrollY = getScrollPos().y;
    var documentElement = document.documentElement;

    function storeScrollData() {
      var y = getScrollPos().y;var scrollStatus = "";

      if (y <= 0) {
        scrollStatus = "top";
      } else if ((window.innerHeight + y) >= document.body.offsetHeight) {
        scrollStatus = "bottom";
      } else {
        var isScrollDown = (y - lastScrollY > 0) ? true : false;
        scrollStatus = isScrollDown ? "down" : "up";
      }

      lastScrollY = y;
      documentElement.setAttribute("data-scroll-status", scrollStatus);
    }

    window.addEventListener('scroll', function(e) {
      storeScrollData();
    });

    storeScrollData();
  }
  document.addEventListener('DOMContentLoaded', initHeader);
</script>














































































































































<script>
  function hashLocate(hashValue) {
    hashValue = hashValue.replace(/^.*#h-/, '');
    hashValue = decodeURIComponent(hashValue);
    var element = document.getElementById(hashValue);

    if (!element) {
      return;
    }

    var header = document.querySelector('header.site-header');
    var headerRect = header.getBoundingClientRect();
    var headerTop = Math.floor(headerRect.top);
    var headerHeight = Math.floor(headerRect.height);
    var scrollPos = getScrollPos();
    var offsetY = element.offsetTop - (headerTop + headerHeight + 20);

    if (offsetY == scrollPos.y) {
      return;
    }

    if (headerTop == 0  && offsetY > scrollPos.y) {
      offsetY += headerHeight + 2;
    } else if (headerTop < 0  && offsetY < scrollPos.y) {
      offsetY -= headerHeight - 2;
    }

    smoothScrollTo(offsetY);
  }

  // The first event occurred
  window.addEventListener('load', function(event) {
    if (window.location.hash) {
      hashLocate(window.location.hash);
    }
  });

  // The first event occurred
  window.addEventListener('click', function(event) {
    if (event.target.tagName.toLowerCase() == 'a') {
      hashLocate(event.target.getAttribute('href'));
    }
  });
</script>

<script>
  (function() {
    var sw = document.getElementById('theme-switch');
    var html = document.getElementsByTagName('html')[0];
    var nightModeOption = ('auto' || 'auto').toLowerCase();
    // 항상 localStorage를 사용 — 'auto' 모드에서도 유저가 직접 누른 토글이
    // 브라우저 세션이 끝났다고 사라지지 않고, 다음 예약된 자동 전환 시점까지 유지된다.
    var storage = localStorage;
    var themeData = loadThemeData();

    function saveThemeData(data) {
      storage.setItem('theme', JSON.stringify(data));
    }

    function loadThemeData() {
      var data = storage.getItem('theme');
      try {
        data = JSON.parse(data ? data : '');
      } catch(e) {
        data = { nightShift: undefined, autoToggleAt: 0 };
        saveThemeData(data);
      }
      return data;
    }

    function handleThemeToggle(nightShift) {
      themeData.nightShift = nightShift;
      saveThemeData(themeData);
      html.dataset.theme = nightShift ? 'dark' : 'light';
      setTimeout(function() {
        sw.checked = nightShift ? true : false;
      }, 50);
    }

    function autoThemeToggle() {
      // Next time point of theme toggle
      var now = new Date();
      var toggleAt = new Date();
      var hours = now.getHours();
      var nightShift = hours >= 19 || hours <=7;

      if (nightShift) {
        if (hours > 7) {
          toggleAt.setDate(toggleAt.getDate() + 1);
        }
        toggleAt.setHours(7);
      } else {
        toggleAt.setHours(19);
      }

      toggleAt.setMinutes(0);
      toggleAt.setSeconds(0);
      toggleAt.setMilliseconds(0)

      var delay = toggleAt.getTime() - now.getTime();

      // auto toggle theme mode
      setTimeout(function() {
        handleThemeToggle(!nightShift);
      }, delay);

      return {
        nightShift: nightShift,
        toggleAt: toggleAt.getTime()
      };
    }

    // Listen the theme toggle event
    sw.addEventListener('change', function(event) {
      handleThemeToggle(event.target.checked);
    });

    if (nightModeOption == 'auto') {
      var data = autoThemeToggle();

      // Toggle theme by local setting
      if (data.toggleAt > themeData.autoToggleAt) {
        themeData.autoToggleAt = data.toggleAt;
        handleThemeToggle(data.nightShift);
      } else {
        handleThemeToggle(themeData.nightShift);
      }
    } else if (nightModeOption == 'manual') {
      handleThemeToggle(themeData.nightShift);
    } else {
      var nightShift = themeData.nightShift;
      if (nightShift === undefined) {
        nightShift = nightModeOption === 'on';
      }
      handleThemeToggle(nightShift);
    }
  })();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var blocks = document.querySelectorAll('pre');

  function addCopyButton(pre) {
    if (pre.querySelector('.code-copy-btn')) return;
    var code = pre.querySelector('code');
    if (!code) return;

    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'code-copy-btn';
    btn.textContent = 'Copy';
    pre.appendChild(btn);

    btn.addEventListener('click', function () {
      var text = code.textContent;

      function done(ok) {
        btn.textContent = ok ? 'Copied!' : 'Failed';
        setTimeout(function () { btn.textContent = 'Copy'; }, 1500);
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () { done(true); }, function () { done(false); });
        return;
      }

      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try {
        done(document.execCommand('copy'));
      } catch (e) {
        done(false);
      }
      document.body.removeChild(ta);
    });
  }

  for (var i = 0; i < blocks.length; i++) {
    addCopyButton(blocks[i]);
  }
});
</script>

    <div class="wrapper">
      <div class="framework no-sidebar">
  <section class="main">

     <div class="search-page">
  <h1 class="page-heading">Search</h1>
  <p class="search-sub">제목·태그·카테고리·본문 요약으로 검색합니다. 태그를 눌러 필터링할 수 있어요.</p>

  <div class="search-box">
    <input type="text" id="search-input" placeholder="검색어를 입력하세요..." autocomplete="off">
  </div>

  <div class="search-tags" id="search-tags"></div>

  <div class="search-meta" id="search-meta"></div>

  <ul class="search-results" id="search-results"></ul>
</div>

<script>
(function () {
  var DATA_URL = "/search.json";
  var input = document.getElementById('search-input');
  var tagsEl = document.getElementById('search-tags');
  var metaEl = document.getElementById('search-meta');
  var resultsEl = document.getElementById('search-results');

  var posts = [];
  var activeTags = {};
  var debounceTimer = null;

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function buildTagCloud() {
    var counts = {};
    posts.forEach(function (p) {
      (p.tags || []).forEach(function (t) {
        counts[t] = (counts[t] || 0) + 1;
      });
    });
    var tags = Object.keys(counts).sort(function (a, b) {
      return counts[b] - counts[a] || a.localeCompare(b);
    });
    tagsEl.innerHTML = tags.map(function (t) {
      return '<button type="button" class="search-tag" data-tag="' + escapeHtml(t) + '">'
        + escapeHtml(t) + ' <span class="search-tag-count">' + counts[t] + '</span></button>';
    }).join('');
  }

  function matchesQuery(post, terms) {
    if (terms.length === 0) return true;
    var haystack = [
      post.title,
      (post.tags || []).join(' '),
      (post.categories || []).join(' '),
      post.excerpt
    ].join(' ').toLowerCase();
    return terms.every(function (term) {
      return haystack.indexOf(term) !== -1;
    });
  }

  function matchesTags(post) {
    var selected = Object.keys(activeTags).filter(function (k) { return activeTags[k]; });
    if (selected.length === 0) return true;
    var postTags = post.tags || [];
    return selected.some(function (t) { return postTags.indexOf(t) !== -1; });
  }

  function render() {
    var query = (input.value || '').trim().toLowerCase();
    var terms = query.length ? query.split(/\s+/) : [];

    var filtered = posts.filter(function (p) {
      return matchesQuery(p, terms) && matchesTags(p);
    });

    metaEl.textContent = filtered.length + '개의 글';

    if (filtered.length === 0) {
      resultsEl.innerHTML = '<li class="search-empty">검색 결과가 없습니다.</li>';
      return;
    }

    resultsEl.innerHTML = filtered.map(function (p) {
      var badges = (p.categories || []).map(function (c) {
        return '<span class="search-badge">' + escapeHtml(c) + '</span>';
      }).join('');
      return (
        '<li class="search-result">'
        + '<a href="' + p.url + '">'
        + '<span class="search-result-title">' + escapeHtml(p.title) + '</span>'
        + '<span class="search-result-meta">' + p.date + ' ' + badges + '</span>'
        + '<span class="search-result-excerpt">' + escapeHtml(p.excerpt) + '</span>'
        + '</a></li>'
      );
    }).join('');
  }

  tagsEl.addEventListener('click', function (e) {
    var btn = e.target.closest ? e.target.closest('.search-tag') : null;
    if (!btn) return;
    var tag = btn.getAttribute('data-tag');
    activeTags[tag] = !activeTags[tag];
    btn.classList.toggle('active', !!activeTags[tag]);
    render();
  });

  input.addEventListener('input', function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(render, 120);
  });

  fetch(DATA_URL)
    .then(function (res) { return res.json(); })
    .then(function (data) {
      posts = data;
      buildTagCloud();
      render();
      var params = new URLSearchParams(location.search);
      var q = params.get('q');
      if (q) {
        input.value = q;
        render();
      }
    })
    .catch(function () {
      metaEl.textContent = '검색 데이터를 불러오지 못했습니다.';
    });
})();
</script>
